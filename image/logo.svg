<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" rx="56" fill="url(#bg)"/>
  <rect x="6" y="6" width="388" height="388" rx="52" fill="none" stroke="#ff9d2b" stroke-width="2" opacity="0.35"/>

  <!-- grid -->
  <g stroke="#1a2028" stroke-width="1">
    <line x1="40"  y1="80"  x2="360" y2="80"/>
    <line x1="40"  y1="140" x2="360" y2="140"/>
    <line x1="40"  y1="200" x2="360" y2="200"/>
    <line x1="40"  y1="260" x2="360" y2="260"/>
    <line x1="100" y1="60"  x2="100" y2="280"/>
    <line x1="160" y1="60"  x2="160" y2="280"/>
    <line x1="220" y1="60"  x2="220" y2="280"/>
    <line x1="280" y1="60"  x2="280" y2="280"/>
  </g>

  <!-- candlesticks -->
  <g filter="url(#glow)">
    <!-- red -->
    <line x1="75"  y1="100" x2="75"  y2="210" stroke="#ff4757" stroke-width="2"/>
    <rect x="65"  y="120" width="20" height="70" fill="#ff4757"/>

    <!-- green -->
    <line x1="125" y1="90"  x2="125" y2="230" stroke="#2ed573" stroke-width="2"/>
    <rect x="115" y="140" width="20" height="70" fill="#2ed573"/>

    <!-- red -->
    <line x1="175" y1="110" x2="175" y2="240" stroke="#ff4757" stroke-width="2"/>
    <rect x="165" y="160" width="20" height="60" fill="#ff4757"/>

    <!-- green big -->
    <line x1="225" y1="70"  x2="225" y2="220" stroke="#2ed573" stroke-width="2"/>
    <rect x="215" y="90"  width="20" height="110" fill="#2ed573"/>

    <!-- green -->
    <line x1="275" y1="60"  x2="275" y2="170" stroke="#2ed573" stroke-width="2"/>
    <rect x="265" y="80"  width="20" height="70" fill="#2ed573"/>

    <!-- red small -->
    <line x1="325" y1="70"  x2="325" y2="150" stroke="#ff4757" stroke-width="2"/>
    <rect x="315" y="90"  width="20" height="40" fill="#ff4757"/>
  </g>

  <!-- wordmark -->
  <text x="200" y="340"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="64" font-weight="700"
        text-anchor="middle" fill="#ff9d2b" letter-spacing="2">notbbg</text>

  <!-- blinking cursor style block -->
  <rect x="308" y="310" width="14" height="32" fill="#ff9d2b" opacity="0.9"/>
</svg>
